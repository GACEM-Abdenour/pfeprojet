<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demo - Connexion GIA</title>
  <link rel="stylesheet" href="../src/assets/css/styles.min.css" />
</head>
<body>
  <!--  Body Wrapper -->
  <div class="page-wrapper" id="main-wrapper" data-layout="vertical" data-navbarbg="skin6" data-sidebartype="full"
    data-sidebar-position="fixed" data-header-position="fixed">
    <div
      class="position-relative overflow-hidden text-bg-light min-vh-100 d-flex align-items-center justify-content-center">
      <div class="d-flex align-items-center justify-content-center w-100">
        <div class="row justify-content-center w-100">
          <div class="col-md-8 col-lg-6 col-xxl-3">
            <div class="card mb-0">
              <div class="card-body">
                <a href="#" class="text-nowrap logo-img text-center d-block py-3 w-100">
                  <h2 class="text-primary fw-bold">GIA</h2>
                  <p class="text-muted mb-0">Gestion des Incidents Applicatifs</p>
                </a>
                <p class="text-center text-muted">Plateforme Intégrée de Gestion et de Suivi des Incidents</p>
                
                <div class="alert alert-info" role="alert">
                  <strong>Mode Démo:</strong> Cette page montre l'interface de connexion. 
                  Pour tester l'authentification complète, SQL Server Express doit être installé.
                </div>
                
                <form id="demoForm">
                  <div class="mb-3">
                    <label for="username" class="form-label">Nom d'utilisateur</label>
                    <input type="text" class="form-control" id="username" name="username" 
                           aria-describedby="usernameHelp" required autofocus>
                  </div>
                  <div class="mb-4">
                    <label for="password" class="form-label">Mot de passe</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                  </div>
                  <div class="d-flex align-items-center justify-content-between mb-4">
                    <div class="form-check">
                      <input class="form-check-input primary" type="checkbox" value="1" id="remember" name="remember">
                      <label class="form-check-label text-dark" for="remember">
                        Se souvenir de moi
                      </label>
                    </div>
                  </div>
                  <button type="submit" class="btn btn-primary w-100 py-8 fs-4 mb-4 rounded-2">Se connecter</button>
                </form>
                
                <div id="demoResult" class="mt-3" style="display:none;">
                  <div class="alert alert-success">
                    <strong>Simulation:</strong> <span id="resultText"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../src/assets/libs/jquery/dist/jquery.min.js"></script>
  <script src="../src/assets/libs/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Demo simulation
    document.getElementById('demoForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const resultDiv = document.getElementById('demoResult');
      const resultText = document.getElementById('resultText');
      
      // Simulate role-based redirect
      let role = 'Reporter';
      let redirect = 'create_ticket.php';
      
      if (username === 'admin') {
        role = 'Admin';
        redirect = 'admin_dashboard.php';
      } else if (username === 'tech1' || username.startsWith('tech')) {
        role = 'Technician';
        redirect = 'tech_dashboard.php';
      }
      
      resultText.innerHTML = `Connexion simulée réussie!<br>
        Utilisateur: ${username}<br>
        Rôle: ${role}<br>
        Redirection vers: ${redirect}<br><br>
        <small>Note: Pour une authentification réelle, SQL Server Express doit être configuré.</small>`;
      resultDiv.style.display = 'block';
    });
  </script>
</body>
</html>
